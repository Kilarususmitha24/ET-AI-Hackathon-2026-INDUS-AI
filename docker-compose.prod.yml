# Production deployment — backend + frontend (Neo4j optional; app works without it)
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: indus-ai-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production}
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-indusai2026}
      DATABASE_URL: sqlite:///./indus_ai.db
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    volumes:
      - backend_uploads:/app/uploads
      - backend_data:/app/data
      - backend_db:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: indus-ai-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

  neo4j:
    image: neo4j:5.15-community
    container_name: indus-ai-neo4j
    restart: unless-stopped
    profiles: ["full"]
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-indusai2026}
    volumes:
      - neo4j_data:/data

volumes:
  neo4j_data:
  backend_uploads:
  backend_data:
  backend_db:
