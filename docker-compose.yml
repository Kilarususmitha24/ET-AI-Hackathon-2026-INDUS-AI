version: '3.8'

services:
  neo4j:
    image: neo4j:5.15-community
    container_name: indus-ai-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/indusai2026
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 10s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: indus-ai-backend
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SECRET_KEY=${SECRET_KEY:-indus-ai-hackathon-2026-secret-key}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=indusai2026
      - DATABASE_URL=sqlite:///./indus_ai.db
      - CORS_ORIGINS=http://localhost:5173,http://localhost:3000,http://frontend:80
    volumes:
      - backend_uploads:/app/uploads
      - backend_data:/app/data
    depends_on:
      neo4j:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: indus-ai-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  neo4j_data:
  backend_uploads:
  backend_data:
